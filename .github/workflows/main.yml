name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4 # Cập nhật lên v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Tự động lấy phiên bản flutter mới nhất
          
      - run: flutter pub get
      
      - name: Build iOS Release
        run: flutter build ios --release --no-codesign
        
      - name: Create IPA Container
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4 # SỬA LỖI TẠI ĐÂY: Dùng v4 thay vì v3
        with:
          name: ios-app-release
          path: app.ipa
